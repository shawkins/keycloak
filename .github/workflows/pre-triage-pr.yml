name: Pre-triage Pull Request

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
    branches:
      - main 

jobs:
  pre-triage:
    env:
      GH_TOKEN: ${{ github.token }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check linked issues
        id: check-linked-issues
        continue-on-error: true
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          set -uo pipefail
          FAILED=0
          ERRORS=""
          MARKER="<!-- pre-triage-linked-issues -->"
          SKIP_LABEL="skip-issue-check"

          # Append an error message to the ERRORS list and emit a CI annotation.
          add_error() {
            echo "::error::$1"
            ERRORS="${ERRORS}"$'\n'"- $1"
            FAILED=1
          }

          HAS_SKIP_LABEL=$(gh api "repos/$REPO/issues/$PR_NUMBER/labels" \
            --jq ".[] | select(.name == \"$SKIP_LABEL\") | .name" | head -1 || true)

          if [ -n "$HAS_SKIP_LABEL" ]; then
            EXISTING_COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
              --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1 || true)
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/$REPO/issues/comments/$EXISTING_COMMENT_ID" -X DELETE
            fi
            echo "Skipping linked issue checks because '$SKIP_LABEL' label is present."
            exit 0
          fi

          # Extract linked issue references from a block of text.
          # Accepts all GitHub closing keywords (case-insensitive, with optional colon) followed by
          # same-repo (#NNN), cross-repo (owner/repo#NNN), or URL references.
          # Outputs one reference per line in the format "owner/repo#NNN" or "#NNN".
          extract_issues() {
            local text="$1"
            printf '%s\n' "$text" | perl -ne '
              # Match GitHub closing keywords followed by a same-repo (#NNN),
              # cross-repo (owner/repo#NNN), or URL issue reference.
              while (/\b(?:close|closes|closed|fix|fixes|fixed|resolve|resolves|resolved)\b:?[ \t]+(?:(?:(?<cro>[\w-]+)\/(?<crr>[\w-]+)#)|#|(?:https:\/\/github\.com\/(?<urlo>[\w-]+)\/(?<urlr>[\w-]+)\/issues\/))(?<num>\d+)\b/gi) {
                my $owner = ($+{cro} // $+{urlo} // "");
                my $repo  = ($+{crr} // $+{urlr} // "");
                my $num   = $+{num};
                if ($owner && $repo) {
                  print "$owner/$repo#$num\n";
                } else {
                  print "#$num\n";
                }
              }
            ' | sort -u || true
          }

          # Normalize issue references: expand same-repo #NNN to OWNER/REPO#NNN.
          # Requires $REPO to be set (provided by the workflow env block).
          normalize_issues() {
            local issues="$1"
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              if [[ "$ref" == \#* ]]; then
                echo "${REPO}#${ref#\#}"
              else
                echo "$ref"
              fi
            done <<< "$issues" | sort -u
          }

          # --- Check PR description ---
          PR_ISSUES=$(extract_issues "$PR_BODY")
          NORM_PR_ISSUES=$(normalize_issues "$PR_ISSUES")

          if [ -z "$PR_ISSUES" ]; then
            add_error "PR description must contain a linked issue (e.g. 'Closes #NNN' or 'Fixes owner/repo#NNN')"
          fi

          # --- Check each commit in the PR ---
          ALL_COMMIT_ISSUES=""
          while IFS= read -r sha; do
            if ! COMMIT_MSG=$(gh api "repos/$REPO/git/commits/$sha" --jq '.message' 2>&1); then
              add_error "Failed to retrieve commit message for $sha: $COMMIT_MSG"
              continue
            fi

            ISSUES=$(extract_issues "$COMMIT_MSG")
            if [ -z "$ISSUES" ]; then
              add_error "Commit $sha must contain a linked issue (e.g. 'Closes #NNN' or 'Fixes owner/repo#NNN')"
            fi
            ALL_COMMIT_ISSUES="${ALL_COMMIT_ISSUES}"$'\n'"${ISSUES}"
          done < <(gh api --paginate "repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[].sha')

          if [ "$FAILED" -eq 0 ]; then
            COMMIT_ISSUES=$(printf '%s\n' "$ALL_COMMIT_ISSUES" | sort -u | grep -v '^$' || true)
            NORM_COMMIT_ISSUES=$(normalize_issues "$COMMIT_ISSUES")

            # --- Verify PR description and commits reference exactly the same issues ---
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              if ! printf '%s\n' "$NORM_COMMIT_ISSUES" | grep -Fxq -- "$ref"; then
                add_error "Issue $ref is linked in the PR description but not in the commit messages"
              fi
            done <<< "$NORM_PR_ISSUES"

            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              if ! printf '%s\n' "$NORM_PR_ISSUES" | grep -Fxq -- "$ref"; then
                add_error "Issue $ref is linked in the commit messages but not in the PR description"
              fi
            done <<< "$NORM_COMMIT_ISSUES"
          fi

          if [ "$FAILED" -eq 0 ]; then
            # --- Verify all linked issues are open ---
            while IFS= read -r ref; do
              [ -z "$ref" ] && continue
              [[ "$ref" != *#* ]] && continue
              issue_repo="${ref%%#*}"
              issue_num="${ref##*#}"
              if ! ISSUE_DATA=$(gh api "repos/$issue_repo/issues/$issue_num" 2>&1); then
                add_error "Issue $ref could not be retrieved: $ISSUE_DATA"
                continue
              fi
              STATE=$(printf '%s' "$ISSUE_DATA" | jq -r '.state')
              if [ "$STATE" != "open" ]; then
                add_error "Issue $ref is not open (current state: $STATE)"
              fi
            done <<< "$NORM_PR_ISSUES"
          fi

          # --- Find any existing bot comment with our marker ---
          EXISTING_COMMENT_ID=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq ".[] | select(.body | contains(\"$MARKER\")) | .id" | head -1 || true)

          if [ "$FAILED" -ne 0 ]; then
            COMMENT_BODY="${MARKER}
          Thank you for contributing this PR. The following linked issue checks failed:
          ${ERRORS}

          Please refer to [CONTRIBUTING.md](https://github.com/${REPO}/blob/main/CONTRIBUTING.md) for requirements."

            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/$REPO/issues/comments/$EXISTING_COMMENT_ID" -X PATCH --raw-field "body=$COMMENT_BODY"
            else
              gh pr comment "$PR_NUMBER" -R "$REPO" --body "$COMMENT_BODY"
            fi
            exit 1
          else
            # Remove any previous failure comment on success
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api "repos/$REPO/issues/comments/$EXISTING_COMMENT_ID" -X DELETE
            fi
            echo "All linked issue checks passed."
          fi

      - name: Add label
        if: steps.check-linked-issues.outcome == 'failure'
        run: gh pr edit "${{ github.event.pull_request.number }}" -R "$GITHUB_REPOSITORY" --add-label "action/waiting-for-author"
      # Label is removed when linked-issue checks do not fail
      - name: Remove label
        if: steps.check-linked-issues.outcome != 'failure'
        run: gh pr edit "${{ github.event.pull_request.number }}" -R "$GITHUB_REPOSITORY" --remove-label "action/waiting-for-author"
