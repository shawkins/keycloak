---
openapi: 3.1.0
components:
  schemas:
    Auth:
      type: object
      properties:
        method:
          type: string
          description: Which authentication method is used for this client
        secret:
          type: string
          description: Secret used to authenticate this client with Secret authentication
        certificate:
          type: string
          description: Public key used to authenticate this client with Signed JWT
            authentication
    BaseClientRepresentation:
      description: Base client representation with common properties for all client
        types
      type: object
      properties:
        fieldMapper:
          $ref: "#/components/schemas/FieldMapper"
        uuid:
          type: string
          description: UUID generated by the server
          readOnly: true
        clientId:
          type: string
          pattern: \S
        displayName:
          type: string
        description:
          type: string
        enabled:
          type: boolean
        appUrl:
          type: string
        redirectUris:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: \S
        roles:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: \S
        protocol:
          type: string
          pattern: \S
      required:
      - clientId
      - protocol
      discriminator:
        propertyName: protocol
        mapping:
          openid-connect: "#/components/schemas/OIDCClientRepresentation"
          saml: "#/components/schemas/SAMLClientRepresentation"
    FieldMapper:
      type: object
    Flow:
      type: string
      enum:
      - STANDARD
      - IMPLICIT
      - DIRECT_GRANT
      - SERVICE_ACCOUNT
      - TOKEN_EXCHANGE
      - DEVICE
      - CIBA
    OIDCClientRepresentation:
      type: object
      properties:
        loginFlows:
          type: array
          uniqueItems: true
          items:
            $ref: "#/components/schemas/Flow"
        auth:
          $ref: "#/components/schemas/Auth"
        webOrigins:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: \S
        serviceAccountRoles:
          type: array
          uniqueItems: true
          items:
            type: string
            pattern: \S
        protocol:
          type: string
      allOf:
      - $ref: "#/components/schemas/BaseClientRepresentation"
    SAMLClientRepresentation:
      description: SAML Client configuration
      type: object
      properties:
        protocol:
          type: string
        nameIdFormat:
          type: string
        forceNameIdFormat:
          type: boolean
        includeAuthnStatement:
          type: boolean
        signDocuments:
          type: boolean
        signAssertions:
          type: boolean
        clientSignatureRequired:
          type: boolean
        forcePostBinding:
          type: boolean
        frontChannelLogout:
          type: boolean
        signatureAlgorithm:
          type: string
        signatureCanonicalizationMethod:
          type: string
        signingCertificate:
          type: string
        allowEcpFlow:
          type: boolean
      allOf:
      - $ref: "#/components/schemas/BaseClientRepresentation"
  securitySchemes:
    bearer-auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Bearer token authentication using a Keycloak access token
tags:
- name: Clients (v2)
paths:
  /admin/api/{realmName}/clients/v2:
    get:
      summary: Get all clients
      description: Returns a list of all clients in the realm
      operationId: getClients
      tags:
      - Clients (v2)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BaseClientRepresentation"
    post:
      summary: Create a new client
      description: Creates a new client in the realm
      operationId: createClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseClientRepresentation"
        required: true
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
    parameters:
    - name: realmName
      in: path
      required: true
      schema:
        type: string
  /admin/api/{realmName}/clients/v2/{id}:
    get:
      summary: Get a client
      description: Returns a single client by its clientId
      operationId: getClient
      tags:
      - Clients (v2)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
        "404":
          description: Not Found
    put:
      summary: Create or update a client
      description: Creates or updates a client in the realm
      operationId: createOrUpdateClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BaseClientRepresentation"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
    patch:
      summary: Patch a client
      description: Partially updates a client using JSON Merge Patch
      operationId: patchClient
      tags:
      - Clients (v2)
      requestBody:
        content:
          application/merge-patch+json:
            schema:
              type: object
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BaseClientRepresentation"
        "404":
          description: Not Found
    delete:
      summary: Delete a client
      description: Deletes a client from the realm
      operationId: deleteClient
      tags:
      - Clients (v2)
      responses:
        "204":
          description: Client successfully deleted
        "404":
          description: Not Found
    parameters:
    - name: realmName
      in: path
      required: true
      schema:
        type: string
    - name: id
      in: path
      required: true
      schema:
        type: string
security:
- bearer-auth: []
info:
  title: Keycloak API
  version: 999.0.0-SNAPSHOT
